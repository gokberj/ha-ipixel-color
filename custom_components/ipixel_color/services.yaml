display_text:
  name: Display Text
  description: Display text on the iPIXEL device with custom effects and colors
  target:
    entity:
      integration: ipixel_color
      domain: text
  fields:
    text:
      name: Text
      description: Text to display (max 500 characters)
      required: true
      example: "Hello World"
      selector:
        text:
    effect:
      name: Effect
      description: Display effect for the text
      required: false
      default: "scroll_ltr"
      selector:
        select:
          options:
            - "fixed"
            - "scroll_rtl"
            - "scroll_ltr"
            - "blink"
            - "breeze"
            - "snow"
            - "laser"
    speed:
      name: Speed
      description: Animation speed (1-100)
      required: false
      default: 50
      selector:
        number:
          min: 1
          max: 100
          mode: slider
    color_fg:
      name: Text Color
      description: Foreground text color
      required: false
      default: [255, 255, 255]
      selector:
        color_rgb:
    color_bg:
      name: Background Color
      description: Background color
      required: false
      default: [0, 0, 0]
      selector:
        color_rgb:
display_weather_clock:
  name: Display Weather Clock
  description: Render a 96x16 bitmap layout with weather icon, date, clock, and temperature.
  target:
    entity:
      integration: ipixel_color
      domain: text
  fields:
    weather_entity:
      name: Weather Entity
      description: Weather entity used for condition and temperature.
      required: false
      default: weather.forecast_home
      selector:
        entity:
          domain: weather
    custom_text:
      name: Custom Text
      description: Optional top-row text. If omitted, the Custom Text entity is used; if that is empty, the current date is used.
      required: false
      selector:
        text:
    font_name:
      name: Font
      description: Font file to use for date, time, and temperature.
      required: false
      default: 7x5.ttf
      selector:
        text:
    font_size:
      name: Font Size
      description: Font size for the weather clock layout.
      required: false
      default: 7.5
      selector:
        number:
          min: 4
          max: 16
          step: 0.5
          mode: box
